services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    ports:
      - "5432:5432"

  backend:
    image: golang:1.26-alpine
    command: go run .
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgres://demo:demo@postgres:5432/demo?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      - backend